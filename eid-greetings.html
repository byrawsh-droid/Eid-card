<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>عيد أضحى مبارك 🕋</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#setup-screen {
  width: 100%; max-width: 420px;
  background: #f7f7f7;
  border: 1px solid #e8e8e8;
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  animation: fadeUp 0.5s ease;
}
.setup-title { font-size:20px; font-weight:700; margin-bottom:6px;
  background: linear-gradient(135deg,#5bb8f0,#f0b84d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.setup-sub { font-size:13px; color:rgba(0,0,0,0.6); margin-bottom:24px; line-height:1.7; }
.setup-title-en { font-size:16px; font-weight:400; color:rgba(255,255,255,0.5); display:block; margin-top:2px; }
.setup-sub-en { font-size:12px; color:rgba(0,0,0,0.6); }

.designs-row { display:flex; gap:12px; margin-bottom:22px; }
.design-option {
  flex:1; border-radius:14px; overflow:hidden;
  border:2.5px solid transparent; cursor:pointer;
  transition: border-color 0.2s, transform 0.15s;
  position:relative;
}
.design-option img { width:100%; display:block; height:180px; object-fit:cover; object-position:top; }
.design-option.selected { border-color:#5bb8f0; transform:scale(1.03); }
.design-check {
  position:absolute; top:8px; left:8px;
  width:22px; height:22px; background:#5bb8f0;
  border-radius:50%; display:none;
  align-items:center; justify-content:center;
  font-size:12px; color:#fef0e3;
}
.design-option.selected .design-check { display:flex; }

label.input-label { display:block; text-align:right; font-size:13px; color:rgba(0,0,0,0.55); margin-bottom:8px; }
.name-input {
  width:100%; padding:13px 16px;
  background:#f0f0f0;
  border:1.5px solid #ddd;
  color:#1a1a1a !important;
  border-radius:12px; font-family:'Cairo',sans-serif;
  font-size:17px; font-weight:600; color:rgba(0,0,0,0.55);
  text-align:center; outline:none; direction:rtl;
  transition:border-color 0.2s;
}
.name-input::placeholder { color:rgba(0,0,0,0.35); }
.name-input:focus { border-color:#5bb8f0; }
.btn-go {
  width:100%; margin-top:14px; padding:14px;
  background:linear-gradient(135deg,#5bb8f0,#f0b84d);
  border:none; border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:16px;
  font-weight:700; color:#fef0e3; cursor:pointer; transition:opacity 0.2s;
}
.btn-go:hover { opacity:0.88; }

#card-screen { display:none; width:100%; max-width:420px; animation:fadeUp 0.6s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-wrap { position:relative; border-radius:22px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
.card-img { width:100%; display:block; }

/* الاسم يُحسب بنسبة مئوية من ارتفاع الصورة */
.name-overlay {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  pointer-events: none;
}

/* تصميم 1 — الخط عند 60.6%، الاسم يبدأ من 63% */
.name-overlay.d1 { top: 88%; transform: translateY(-50%); }
.name-overlay.d1 .name-display {
  font-size: clamp(18px, 4.5vw, 32px);
  font-weight: 800;
  color: #fef0e3;
}

/* تصميم 2 — الخط عند 64%، الاسم يبدأ من 67% */
.name-overlay.d2 { top: 63%; transform: translateY(-50%); }
.name-overlay.d2 .name-display {
  font-size: clamp(18px, 4vw, 28px);
  font-weight: 800;
  color: #fef0e3;
}

.actions { display:flex; gap:10px; margin-top:16px; }
.btn-share {
  flex:1; padding:13px;
  background:linear-gradient(135deg,#5bb8f0,#3a9fd4);
  border:none; border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:14px; font-weight:700; color:#fef0e3;
  cursor:pointer; transition:opacity 0.2s;
}
.btn-share:hover { opacity:0.88; }
.btn-back {
  flex:1; padding:13px;
  background:#f0f0f0;
  border:1px solid #ddd;
  border-radius:12px; font-family:'Cairo',sans-serif;
  font-size:14px; font-weight:600; color:rgba(0,0,0,0.6);
  cursor:pointer; transition:background 0.2s;
}
.btn-back:hover { background:#e0e0e0; }
.link-row {
  display:flex; align-items:center; gap:8px; margin-top:10px;
  background:rgba(91,184,240,0.07); border:1px solid rgba(91,184,240,0.18);
  border-radius:10px; padding:9px 13px; cursor:pointer; direction:ltr;
}
.link-row:hover { background:rgba(91,184,240,0.13); }
.link-url { flex:1; font-size:11px; color:rgba(0,0,0,0.4); font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.link-icon { font-size:15px; color:#5bb8f0; flex-shrink:0; }
.copied-msg { text-align:center; font-size:13px; color:#5bb8f0; margin-top:8px; opacity:0; transition:opacity 0.3s; }
.copied-msg.show { opacity:1; }
</style>
</head>

let sel = 1;

function selectDesign(n){ sel=n; document.getElementById('opt1').classList.toggle('selected',n===1); document.getElementById('opt2').classList.toggle('selected',n===2); }

function getParams(){ try{ const p=new URLSearchParams(window.location.search); return {name:p.get('name')||'',design:parseInt(p.get('d')||'1')}; }catch{return{name:'',design:1};} }

function buildURL(name,design){ try{ return window.location.origin+window.location.pathname+'?name='+encodeURIComponent(name)+'&d='+design; }catch{return '?name='+encodeURIComponent(name)+'&d='+design;} }

function showCard(){ const name=document.getElementById('nameInput').value.trim()||'صديقي'; displayCard(name,sel); try{history.pushState(null,'',buildURL(name,sel));}catch{} }

function displayCard(name,design){
  document.getElementById('nameDisplay').textContent = name;
  document.getElementById('cardImg').src = IMGS[design]||IMGS[1];
  document.getElementById('nameOverlay').className = 'name-overlay d'+design;
  document.getElementById('linkPreview').textContent = buildURL(name,design);
  document.getElementById('setup-screen').style.display='none';
  const cs=document.getElementById('card-screen');
  cs.style.display='block'; cs.style.animation='none';
  requestAnimationFrame(()=>{ cs.style.animation='fadeUp 0.6s ease'; });
}

function goBack(){ document.getElementById('setup-screen').style.display='block'; document.getElementById('card-screen').style.display='none'; try{history.pushState(null,'',window.location.pathname);}catch{} }

function copyLink(){ const url=buildURL(document.getElementById('nameDisplay').textContent,sel); if(navigator.clipboard){navigator.clipboard.writeText(url).then(showCopied).catch(()=>fallback(url));}else{fallback(url);} }
function fallback(t){ const a=document.createElement('textarea'); a.value=t; a.style.cssText='position:fixed;opacity:0'; document.body.appendChild(a); a.select(); try{document.execCommand('copy');showCopied();}catch{} document.body.removeChild(a); }
function showCopied(){ const m=document.getElementById('copiedMsg'); m.classList.add('show'); setTimeout(()=>m.classList.remove('show'),2500); }

window.addEventListener('DOMContentLoaded',()=>{ const {name,design}=getParams(); if(name){sel=design;document.getElementById('nameInput').value=name;selectDesign(design);displayCard(name,design);} });
document.getElementById('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter')showCard(); });
</script>
